name: Smart Campus Hub CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-backend:
    name: Build & Test Spring Boot Backend
    runs-on: ubuntu-latest
    
    # We set the working directory to the backend folder
    defaults:
      run:
        working-directory: ./smart-campus-hub

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven # Enables caching of Maven dependencies to speed up builds

    - name: Build with Maven
      # Runs the tests as part of the package phase
      run: mvn clean package

    - name: Upload Backend Artifacts (Optional)
      uses: actions/upload-artifact@v4
      with:
        name: spring-boot-jar
        path: smart-campus-hub/target/*.jar
        retention-days: 5

  build-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./smart-campus-hub-client

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # LTS version recommended for Vite/React 18
        cache: 'npm'
        cache-dependency-path: smart-campus-hub-client/package-lock.json

    - name: Install Dependencies
      run: npm ci # 'ci' is more reliable than 'install' for automated environments

    - name: Run Linter
      run: npm run lint
      continue-on-error: true # Warning only, don't fail build immediately on lint errors

    - name: Build Project
      run: npm run build

    - name: Upload Frontend Artifacts (Optional)
      uses: actions/upload-artifact@v4
      with:
        name: react-dist
        path: smart-campus-hub-client/dist
        retention-days: 5
